<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot iframe host test</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        min-height: 200vh;
        padding: 24px;
      }

      .hint {
        max-width: 900px;
        line-height: 1.5;
      }

      .frame {
        position: fixed;
        right: 20px;
        bottom: 90px;
        width: 380px;
        height: 600px;
        border: 0;
        border-radius: 16px;
        overflow: hidden;
        z-index: 999999;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
        background: white;
        display: none;
      }

      .launcher {
        position: fixed;
        right: 20px;
        bottom: 20px;
        width: 56px;
        height: 56px;
        border-radius: 9999px;
        border: 0;
        background: #00a651;
        color: #fff;
        font: 600 14px/1 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        cursor: pointer;
        z-index: 1000000;
      }
    </style>
  </head>
  <body>
    <h1>Host test page</h1>
    <p class="hint">
      This page simulates an external website embedding your chatbot in an iframe.
      The launcher button is on the host page; the iframe contains the chatbot UI.
    </p>

    <iframe id="om-chatbot-frame" class="frame" src="about:blank" title="Chatbot"></iframe>
    <button id="om-chatbot-launcher" class="launcher" type="button">Chat</button>

    <script>
      const frame = document.getElementById('om-chatbot-frame');
      const launcher = document.getElementById('om-chatbot-launcher');

      // IMPORTANT:
      // `embed.html` is a Vite entry that loads `/src/embed.tsx`.
      // If this host page is served from a static server (e.g. Live Server on :5500),
      // the iframe must point to a running Vite dev server or Vite preview server.
      //
      // Override with: host-test.html?embedOrigin=http://localhost:5173
      const params = new URLSearchParams(window.location.search);
      const embedOrigin = params.get('embedOrigin') || 'http://localhost:5173';
      const token = params.get('token');
      const teaser = params.get('teaser');
      const embedParams = new URLSearchParams();
      if (token) embedParams.set('token', token);
      if (teaser) embedParams.set('teaser', teaser);
      const qs = embedParams.toString();
      frame.src = `${embedOrigin.replace(/\/$/, '')}/embed.html${qs ? `?${qs}` : ''}`;

      function setOpen(open) {
        frame.style.display = open ? 'block' : 'none';
        launcher.textContent = open ? 'Close' : 'Chat';
      }

      launcher.addEventListener('click', () => {
        const open = frame.style.display !== 'block';
        setOpen(open);
      });

      // Allow the iframe to request closing.
      window.addEventListener('message', (event) => {
        if (!event || !event.data) return;
        if (event.data.type === 'OM_CHATBOT_CLOSE') setOpen(false);
      });
    </script>
  </body>
</html>
